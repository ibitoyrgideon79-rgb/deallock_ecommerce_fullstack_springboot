spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  datasource:
    url: jdbc:mysql://mysql-uavu.railway.internal:3306/railway?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  base-url: https://deallockecommercefullstackspringboot-production.up.railway.app
  admin-phones: ""

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}
  whatsapp-number: ${TWILIO_WHATSAPP_NUMBER:}

termii:
  base-url: ${TERMII_BASE_URL:https://api.ng.termii.com/api}
  api-key: ${TERMII_API_KEY:}
  sender-id: ${TERMII_SENDER_ID:}
  sms-channel: ${TERMII_SMS_CHANNEL:dnd}
  whatsapp-sender: ${TERMII_WHATSAPP_SENDER:}


server:
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: strict
